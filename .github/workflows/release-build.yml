name: Release Build

on:
  release:
    types:
      - published

permissions:
  contents: write
  packages: write

jobs:
  frontend:
    name: Build frontend artifact
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install frontend dependencies
        run: npm --prefix web ci

      - name: Build frontend
        run: npm --prefix web run build

      - name: Upload embedded frontend
        uses: actions/upload-artifact@v4
        with:
          name: embedded-frontend
          path: internal/api/web/dist
          if-no-files-found: error

  binaries:
    name: Build ${{ matrix.name }}
    needs: frontend
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: linux-amd64
            runner: ubuntu-latest
            goos: linux
            goarch: amd64
            binary_name: automator
            archive_name: automator_${{ github.event.release.tag_name }}_linux_amd64.tar.gz
          - name: windows-amd64
            runner: windows-latest
            goos: windows
            goarch: amd64
            binary_name: automator.exe
            archive_name: automator_${{ github.event.release.tag_name }}_windows_amd64.zip
          - name: macos-amd64
            runner: macos-13
            goos: darwin
            goarch: amd64
            binary_name: automator
            archive_name: automator_${{ github.event.release.tag_name }}_darwin_amd64.tar.gz
          - name: macos-arm64
            runner: macos-14
            goos: darwin
            goarch: arm64
            binary_name: automator
            archive_name: automator_${{ github.event.release.tag_name }}_darwin_arm64.tar.gz

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup MinGW for Windows CGO
        if: matrix.goos == 'windows'
        uses: msys2/setup-msys2@v2
        with:
          update: true
          install: mingw-w64-x86_64-gcc

      - name: Download embedded frontend
        uses: actions/download-artifact@v4
        with:
          name: embedded-frontend
          path: internal/api/web/dist

      - name: Create dist directory on Unix
        if: matrix.goos != 'windows'
        run: mkdir -p dist

      - name: Create dist directory on Windows
        if: matrix.goos == 'windows'
        shell: pwsh
        run: New-Item -ItemType Directory -Force dist | Out-Null

      - name: Build binary
        env:
          CGO_ENABLED: 1
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CC: ${{ matrix.goos == 'windows' && 'gcc' || '' }}
        run: go build -ldflags="-s -w" -o dist/${{ matrix.binary_name }} ./cmd/server

      - name: Package Unix archive
        if: matrix.goos != 'windows'
        run: tar -C dist -czf dist/${{ matrix.archive_name }} ${{ matrix.binary_name }}

      - name: Package Windows archive
        if: matrix.goos == 'windows'
        shell: pwsh
        run: Compress-Archive -Path dist/${{ matrix.binary_name }} -DestinationPath dist/${{ matrix.archive_name }}

      - name: Upload packaged binary
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.name }}-archive
          path: dist/${{ matrix.archive_name }}
          if-no-files-found: error

  container:
    name: Build and push container
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=raw,value=${{ github.event.release.tag_name }}
            type=raw,value=latest,enable=${{ !github.event.release.prerelease }}

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

  publish-assets:
    name: Upload release assets
    needs:
      - binaries
      - container
    runs-on: ubuntu-latest

    steps:
      - name: Download binary artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-assets
          pattern: "*-archive"
          merge-multiple: true

      - name: Generate checksums
        working-directory: release-assets
        run: sha256sum * > SHA256SUMS.txt

      - name: Upload assets to GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.release.tag_name }}
          files: |
            release-assets/*
          overwrite_files: true
