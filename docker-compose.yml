services:
  automator:
    build: .
    ports:
      - "8080:8080"
    volumes:
      - automator-data:/data
      - automator-agents:/root/.agents
    environment:
      - AUTOMATOR_PORT=8080
      - AUTOMATOR_DB_PATH=/data/automator.db
      - AUTOMATOR_SKILLS_DIR=/root/.agents/skills
    restart: unless-stopped

volumes:
  automator-data:
  automator-agents:
