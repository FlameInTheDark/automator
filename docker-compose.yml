name: emerald

services:
  emerald:
    build: .
    ports:
      - "8080:8080"
    volumes:
      - emerald-data:/data
      - emerald-agents:/root/.agents
    environment:
      - AUTOMATOR_PORT=8080
      - AUTOMATOR_DB_PATH=/data/emerald.db
      - AUTOMATOR_SKILLS_DIR=/root/.agents/skills
    restart: unless-stopped

volumes:
  emerald-data:
  emerald-agents:
